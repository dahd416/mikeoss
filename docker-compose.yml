services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.production
    restart: unless-stopped
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://backend:3001}"
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: "${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}"
    env_file:
      - .env.production
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
